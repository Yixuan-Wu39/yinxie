<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMP 图片隐写原型</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>BMP 图片隐写原型</h1>
          <p>当前版本只支持 24 位无压缩 BMP，输出仍为 BMP。</p>
        </div>
        <span id="server-status" class="status-pill">检查服务中</span>
      </header>

      <section class="panel">
        <h2>1. 输入图片并识别容量</h2>
        <label class="file-zone">
          <input id="hide-image" type="file" accept=".bmp,image/bmp" />
          <span>选择一张 24 位 BMP 图片</span>
        </label>
        <div id="image-report" class="report muted">还没有选择图片。</div>
      </section>

      <section class="panel">
        <h2>2. 输入要隐藏的文本</h2>
        <textarea id="secret-text" rows="8" placeholder="在这里输入要藏进图片里的文本"></textarea>
        <div class="row">
          <span id="text-counter" class="muted">0 字节</span>
          <button id="hide-button" type="button" disabled>处理图片</button>
        </div>
      </section>

      <section class="panel">
        <h2>3. 图片输出</h2>
        <div id="output-report" class="report muted">处理完成后会在这里出现下载按钮。</div>
        <a id="download-link" class="button-link hidden" download>下载隐写 BMP</a>
      </section>

      <section class="panel">
        <h2>4. 验证提取</h2>
        <label class="file-zone">
          <input id="extract-image" type="file" accept=".bmp,image/bmp" />
          <span>选择一张已经处理过的 BMP 图片</span>
        </label>
        <button id="extract-button" type="button" disabled>提取隐藏文本</button>
        <pre id="extract-result" class="result-box">还没有提取结果。</pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
