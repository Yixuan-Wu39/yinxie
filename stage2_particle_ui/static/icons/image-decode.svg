<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">图片解码</title>
  <desc id="desc">输入图片，解码输出图片和文字。</desc>
  <defs>
    <linearGradient id="bg" x1="48" y1="36" x2="464" y2="476" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".36"/>
      <stop offset=".62" stop-color="#dff5ff" stop-opacity=".24"/>
      <stop offset="1" stop-color="#c7f7ec" stop-opacity=".18"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2 2 L12 7 L2 12 Z" fill="#007aff"/>
    </marker>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#2b5f96" flood-opacity=".17"/>
    </filter>
    <symbol id="imageToken" viewBox="0 0 80 80">
      <rect x="6" y="6" width="68" height="68" rx="18" fill="#fff" fill-opacity=".72" stroke="#fff" stroke-opacity=".94"/>
      <circle cx="25" cy="27" r="6" fill="#007aff" opacity=".76"/>
      <path d="M18 58 L33 39 L45 52 L60 30 L68 58 Z" fill="#007aff" opacity=".82"/>
    </symbol>
    <symbol id="textToken" viewBox="0 0 80 80">
      <rect x="6" y="6" width="68" height="68" rx="18" fill="#fff" fill-opacity=".72" stroke="#fff" stroke-opacity=".94"/>
      <text x="40" y="47" font-family="Arial, sans-serif" font-size="19" font-weight="900" text-anchor="middle" fill="#007aff">ABC</text>
    </symbol>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="44" fill="url(#bg)" stroke="#fff" stroke-opacity=".52"/>
  <path d="M64 116 C170 62 300 72 448 164" fill="none" stroke="#fff" stroke-width="2" stroke-opacity=".36"/>
  <path d="M66 392 C180 314 306 444 452 334" fill="none" stroke="#007aff" stroke-width="2" stroke-opacity=".08"/>

  <g filter="url(#shadow)">
    <use href="#imageToken" x="72" y="208" width="96" height="96"/>
    <use href="#imageToken" x="360" y="118" width="96" height="96"/>
    <use href="#textToken" x="360" y="298" width="96" height="96"/>
  </g>

  <path d="M168 256 C204 256 236 256 272 256" fill="none" stroke="#007aff" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M284 256 C318 246 334 178 360 166" fill="none" stroke="#007aff" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M284 256 C318 266 334 334 360 346" fill="none" stroke="#007aff" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow)"/>
</svg>
