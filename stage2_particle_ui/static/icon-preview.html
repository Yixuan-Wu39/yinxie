<!doctype html>
<html lang="zh-CN">

      <h1>多媒体隐写工作台</h1>

        <article>
          <img src="/static/icons/image-decode.svg" alt="图片解码图标" />

        <article>
          <img src="/static/icons/audio-hide.svg" alt="音频隐写图标" />
          <h2>音频隐写</h2>
        </article>
        <article>
          <img src="/static/icons/audio-decode.svg" alt="音频解码图标" />
          <h2>音频解码</h2>
        </article>
      </section>

</html>
